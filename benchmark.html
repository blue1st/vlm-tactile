<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLM Interaction Benchmark</title>
    <link rel="stylesheet" href="benchmark-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Dashboard / Stats -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🎯</span>
                <h1>VLM Bench</h1>
            </div>

            <div class="info-note">
                💡 <b>Coordinate Mapping:</b><br>
                <b>Window</b> is relative to the entire page.<br>
                <b>Arena</b> is relative to the right area only.
            </div>
            
            <div class="stats-panel">
                <div class="stat-item">
                    <label>Target Element</label>
                    <div id="targetName" class="value">Start Button</div>
                </div>
                <div class="stat-item">
                    <label>Expected Coords (x, y)</label>
                    <div id="targetCoords" class="value mono">0, 0</div>
                </div>
                <div class="stat-item">
                    <label>Score</label>
                    <div class="score-container">
                        <span id="hitCount" class="hit">0</span> / <span id="totalCount">0</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button id="toggleHitbox" class="secondary-btn">Toggle Hitbox View</button>
                <button id="resetBtn" class="secondary-btn">Reset Score</button>
                <button id="shuffleBtn" class="primary-btn">Shuffle Layout</button>
            </div>

            <div class="debug-log" id="debugLog">
                <div class="log-entry system">System initialized. Waiting for interaction...</div>
            </div>
        </aside>

        <!-- Benchmark Arena -->
        <main class="arena" id="arena">
            <div class="scanline"></div>
            <div class="overlay-grid"></div>
            
            <!-- Randomly placed elements will be injected here -->
            <div id="gameUIContainer"></div>

            <div id="clickFeedback" class="click-feedback"></div>
        </main>
    </div>

    <script src="benchmark-script.js"></script>
</body>
</html>
